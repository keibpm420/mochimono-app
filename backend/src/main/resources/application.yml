server:
  # Renderなど、リッスンポートをPORT環境変数で指定するホスティング先に対応
  port: ${PORT:8080}

spring:
  application:
    name: mochimono
  datasource:
    # DB_URLを直接指定してもよいし、Renderのようにhost/port/database単位で環境変数が渡される場合は
    # DB_HOST/DB_PORT/DB_NAMEから自動的に組み立てる
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mochimono}}
    username: ${DB_USERNAME:mochimono}
    password: ${DB_PASSWORD:mochimono}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-in-real-deployment-1234567890}
    expiration-days: ${JWT_EXPIRATION_DAYS:30}
  cors:
    # 本番では実際のフロントエンドURL(例: https://mochimono.example.com)をカンマ区切りで指定する
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:4173,http://192.168.*.*:5173,http://192.168.*.*:4173}
