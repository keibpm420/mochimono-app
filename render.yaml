databases:
  - name: mochimono-db
    plan: free
    databaseName: mochimono
    user: mochimono

services:
  - type: web
    name: mochimono-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/mochimono-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: mochimono-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: mochimono-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: mochimono-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: mochimono-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: mochimono-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://mochimono-frontend.onrender.com

  - type: web
    name: mochimono-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://mochimono-backend.onrender.com
